<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Skretting – Encuentra las 9 Diferencias</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  :root { --rojo:#c50e2a; --negro:#111; --blanco:#fff; --gris:#e8e8e8; }

  /* ── BASE (tótem 1080px) ── */
  body { font-family:'Montserrat',sans-serif; background:var(--gris); width:1080px; margin:0 auto; overflow-x:hidden; display:flex; flex-direction:column; align-items:center; }
  .header { width:100%; padding:40px 48px 20px; text-align:center; }
  .titulo { font-size:80px; font-weight:900; text-transform:uppercase; line-height:1.1; color:var(--negro); }
  .titulo span { color:var(--rojo); }
  .barra-wrap { width:100%; position:relative; margin-top:16px; }
  .barra { width:100%; background:var(--negro); height:100px; display:flex; align-items:center; justify-content:space-between; padding:0 60px; }
  .cronometro-wrap { position:absolute; left:50%; transform:translateX(-50%); top:-32px; z-index:10; }
  .cronometro { width:128px; height:128px; border-radius:50%; background:var(--blanco); border:5px solid var(--negro); display:flex; flex-direction:column; align-items:center; justify-content:center; box-shadow:0 4px 20px rgba(0,0,0,.35); }
  .cronometro-num { font-size:50px; font-weight:900; color:var(--negro); line-height:1; }
  .cronometro-num.urgente { color:var(--rojo); animation:latido .5s ease infinite; }
  .cronometro-label { font-size:14px; font-weight:700; color:#888; text-transform:uppercase; letter-spacing:1px; }
  .stat-label { font-size:16px; font-weight:700; text-transform:uppercase; opacity:.6; letter-spacing:2px; color:var(--blanco); }
  .stat-valor { font-size:52px; font-weight:900; color:var(--blanco); line-height:1; }
  .stat-valor span { color:var(--rojo); }
  .vidas { display:flex; flex-direction:column; align-items:flex-end; }
  .vidas-iconos { display:flex; gap:8px; margin-top:4px; }
  .corazon { font-size:44px; transition:all .3s; line-height:1; }
  .corazon.perdido { filter:grayscale(1); opacity:.25; }
  .juego-contenedor { width:100%; padding:80px 20px 0; display:flex; justify-content:center; }
  .juego-inner { display:flex; gap:8px; background:var(--blanco); border-radius:16px; padding:10px; box-shadow:0 8px 40px rgba(0,0,0,.15); }
  .panel { position:relative; width:490px; height:945px; border-radius:8px; overflow:hidden; cursor:crosshair; flex-shrink:0; user-select:none; }
  .panel img.fondo { width:100%; height:100%; object-fit:cover; display:block; pointer-events:none; -webkit-user-drag:none; }
  .zona { position:absolute; border:3px dashed transparent; border-radius:8px; cursor:pointer; transition:border-color .2s, background .2s; overflow:hidden; }
  .zona img.overlay-png { width:100%; height:100%; object-fit:fill; display:block; pointer-events:none; }
  .zona:hover { border-color:rgba(255,230,0,.7); background:rgba(255,230,0,.05); }
  .zona.encontrada { border:3px solid #00e676 !important; pointer-events:none; animation:pulso-ok .4s ease; }
  .zona.encontrada::after { content:'✓'; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:28px; color:#00e676; filter:drop-shadow(0 2px 4px rgba(0,0,0,.7)); z-index:5; }
  .error-ripple { position:absolute; width:56px; height:56px; border-radius:50%; background:rgba(197,14,42,.45); transform:translate(-50%,-50%) scale(0); animation:ripple .5s ease-out forwards; pointer-events:none; z-index:6; }

  /* FOOTER con curva roja */
  .footer {
    width:100%; display:flex; justify-content:center; align-items:center;
    padding:80px 0 100px; margin-top:40px;
    position:relative;
    background:transparent;
  }
  .footer img { height:160px; position:relative; z-index:2; }
  .footer::before {
    content:''; position:absolute;
    top:-2px; left:-5%; right:-5%; height:90px;
    background:transparent;
    border-top:4px solid var(--rojo);
    border-radius:50% 50% 0 0 / 90px 90px 0 0;
    z-index:1;
  }

  /* OVERLAYS */
  .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.78); z-index:200; align-items:center; justify-content:center; }
  .overlay.visible { display:flex; }
  .modal { background:var(--blanco); border-radius:28px; padding:64px 80px; text-align:center; max-width:740px; width:90%; }
  .modal-logo { height:72px; margin-bottom:32px; }
  .modal-emoji { font-size:96px; line-height:1; margin-bottom:16px; }
  .modal-titulo { font-size:68px; font-weight:900; text-transform:uppercase; line-height:1.05; margin-bottom:16px; }
  .modal-titulo.gana { color:var(--rojo); }
  .modal-titulo.pierde { color:var(--negro); }
  .modal-sub { font-size:30px; color:#666; font-weight:600; margin-bottom:44px; }
  .btn-jugar { background:var(--rojo); color:var(--blanco); border:none; border-radius:60px; padding:22px 72px; font-size:30px; font-weight:900; cursor:pointer; font-family:'Montserrat',sans-serif; text-transform:uppercase; letter-spacing:2px; transition:transform .15s, background .15s; }
  .btn-jugar:hover { transform:scale(1.04); background:#a50b23; }
  .confetti-container { position:fixed; inset:0; pointer-events:none; z-index:199; overflow:hidden; }
  .confetti-piece { position:absolute; top:-20px; border-radius:3px; animation:caer linear forwards; }

  /* col-info oculta por defecto (solo compu) */
  .col-info { display:none; }

  @keyframes pulso-ok { 0%{transform:scale(1)} 50%{transform:scale(1.07)} 100%{transform:scale(1)} }
  @keyframes ripple { to{transform:translate(-50%,-50%) scale(3.5);opacity:0} }
  @keyframes caer { to{top:110vh;transform:rotate(720deg)} }
  @keyframes latido { 0%,100%{transform:scale(1)} 50%{transform:scale(1.18)} }

  /* ── MÓVIL Y TABLET (≤1079px) — todo igual, solo escala ── */
  @media (max-width:1079px) {
    body { width:100%; }
    .header { padding:20px 16px 12px; }
    .titulo { font-size:clamp(28px, 6vw, 56px); }
    .barra { height:clamp(60px, 10vw, 100px); padding:0 16px; }
    .barra-wrap { margin-top:8px; }
    .cronometro { width:clamp(70px, 13vw, 128px); height:clamp(70px, 13vw, 128px); }
    .cronometro-num { font-size:clamp(28px, 6vw, 50px); }
    .cronometro-label { font-size:clamp(10px, 2vw, 14px); }
    .cronometro-wrap { top:clamp(-22px, -3.5vw, -32px); }
    .stat-label { font-size:clamp(10px, 2vw, 16px); letter-spacing:1px; }
    .stat-valor { font-size:clamp(28px, 6vw, 52px); }
    .corazon { font-size:clamp(24px, 5vw, 44px); }
    .juego-contenedor { padding:8px 4px 0; }
    .juego-inner { flex-direction:row; gap:4px; padding:4px; width:100%; }
    .panel { width:50%; height:auto; aspect-ratio:490/945; flex-shrink:1; }
    .footer { padding:40px 0 50px; margin-top:20px; }
    .footer img { height:clamp(60px, 12vw, 120px); }
    .footer::before { height:50px; border-radius:50% 50% 0 0 / 50px 50px 0 0; }
    .modal { padding:32px 24px; max-width:90vw; }
    .modal-titulo { font-size:clamp(28px, 7vw, 60px); }
    .modal-sub { font-size:clamp(16px, 4vw, 28px); }
    .btn-jugar { padding:16px 40px; font-size:clamp(18px, 4vw, 28px); }
    .modal-emoji { font-size:clamp(60px, 14vw, 96px); }
    .modal-logo { height:clamp(40px, 9vw, 72px); }
  }

  /* ── COMPUTADORA (≥1080px, no tótem) ── */
  @media (min-width:1080px) and (max-width:1919px) {
    body { width:100vw; flex-direction:row; align-items:stretch; min-height:100vh; }

    /* Columna izquierda */
    .col-info {
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      width:320px; min-height:100vh;
      background:var(--blanco);
      padding:40px 24px;
      gap:36px;
      position:sticky; top:0; height:100vh;
      box-shadow:4px 0 24px rgba(0,0,0,.08);
      z-index:10; flex-shrink:0;
    }
    .col-info .titulo-col { font-size:28px; font-weight:900; text-transform:uppercase; line-height:1.2; color:var(--negro); text-align:center; }
    .col-info .titulo-col span { color:var(--rojo); }
    .col-info .stat-blk { display:flex; flex-direction:column; align-items:center; gap:4px; }
    .col-info .lbl { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:2px; color:#aaa; }
    .col-info .val { font-size:52px; font-weight:900; color:var(--negro); line-height:1; }
    .col-info .val span { color:var(--rojo); }
    .col-info .cron-c { width:110px; height:110px; border-radius:50%; border:5px solid var(--negro); display:flex; flex-direction:column; align-items:center; justify-content:center; box-shadow:0 4px 16px rgba(0,0,0,.12); }
    .col-info .cron-n { font-size:44px; font-weight:900; color:var(--negro); line-height:1; }
    .col-info .cron-n.urgente { color:var(--rojo); animation:latido .5s ease infinite; }
    .col-info .cron-l { font-size:11px; font-weight:700; color:#aaa; text-transform:uppercase; }
    .col-info .vidas-c { display:flex; gap:8px; }
    .col-info .vidas-c span { font-size:36px; transition:all .3s; }
    .col-info .vidas-c span.perdido { filter:grayscale(1); opacity:.25; }
    .col-info .logo-c { width:150px; }
    .col-info .divider { width:60%; height:2px; background:var(--gris); border-radius:2px; }

    /* Columna derecha: scroll con el juego */
    .col-juego {
      flex:1; overflow-y:auto;
      display:flex; flex-direction:column;
      align-items:center;
      padding:0;
    }

    /* En compu ocultamos header y barra originales */
    .header { display:none; }
    .barra-wrap { display:none; }

    /* El juego ocupa el ancho disponible */
    .juego-contenedor { padding:40px 24px 0; width:100%; }
    .juego-inner { width:100%; }
    .panel { flex:1; width:auto; height:auto; aspect-ratio:490/945; }

    /* Footer en col-juego */
    .footer { width:100%; padding:60px 0 80px; margin-top:32px; }
    .footer img { height:120px; }
    .footer::before { height:70px; border-radius:50% 50% 0 0 / 70px 70px 0 0; }
  }
</style>
</head>
<body>

<!-- COLUMNA IZQUIERDA (solo compu) -->
<div class="col-info">
  <img class="logo-c" src="logo.png" alt="Skretting">
  <div class="divider"></div>
  <div class="titulo-col">Encuentra las<br><span>9 Diferencias</span></div>
  <div class="divider"></div>
  <div class="stat-blk">
    <div class="lbl">Encontradas</div>
    <div class="val" id="contadorNum2">0<span>/9</span></div>
  </div>
  <div class="stat-blk">
    <div class="lbl">Tiempo</div>
    <div class="cron-c">
      <div class="cron-n" id="cronNum2">15</div>
      <div class="cron-l">seg</div>
    </div>
  </div>
  <div class="stat-blk">
    <div class="lbl">Vidas</div>
    <div class="vidas-c">
      <span id="vida1b">❤️</span>
      <span id="vida2b">❤️</span>
      <span id="vida3b">❤️</span>
    </div>
  </div>
</div>

<!-- COLUMNA DERECHA (siempre visible) -->
<div class="col-juego">

  <!-- HEADER (visible en tótem y móvil/tablet) -->
  <div class="header">
    <div class="titulo">Encuentra las<br><span>9 Diferencias</span></div>
  </div>

  <!-- BARRA (visible en tótem y móvil/tablet) -->
  <div class="barra-wrap">
    <div class="barra">
      <div class="contador">
        <div class="stat-label">Encontradas</div>
        <div class="stat-valor" id="contadorNum">0<span>/9</span></div>
      </div>
      <div class="cronometro-wrap">
        <div class="cronometro">
          <div class="cronometro-num" id="cronNum">15</div>
          <div class="cronometro-label">seg</div>
        </div>
      </div>
      <div class="vidas">
        <div class="stat-label">Vidas</div>
        <div class="vidas-iconos">
          <span class="corazon" id="vida1">❤️</span>
          <span class="corazon" id="vida2">❤️</span>
          <span class="corazon" id="vida3">❤️</span>
        </div>
      </div>
    </div>
  </div>

  <!-- JUEGO -->
  <div class="juego-contenedor">
    <div class="juego-inner">
      <div class="panel" id="panelIzq" onclick="clickPanel(event,'izq')">
        <img class="fondo" src="fondo_IZ_DER.jpg" alt="Imagen A" draggable="false">
        <div class="zona" id="zona-izq-1" data-id="1" style="left:41.43%;top:19.37%;width:11.63%;height:2.33%;"><img class="overlay-png" src="1I.png" alt=""></div>
        <div class="zona" id="zona-izq-2" data-id="2" style="left:22.45%;top:39.37%;width:9.18%;height:8.25%;"><img class="overlay-png" src="2I.png" alt=""></div>
        <div class="zona" id="zona-izq-3" data-id="3" style="left:55.31%;top:38.1%;width:31.02%;height:9.63%;"><img class="overlay-png" src="3I.png" alt=""></div>
        <div class="zona" id="zona-izq-4" data-id="4" style="left:29.59%;top:51.96%;width:11.22%;height:5.19%;"><img class="overlay-png" src="4I.png" alt=""></div>
        <div class="zona" id="zona-izq-5" data-id="5" style="left:72.24%;top:55.87%;width:14.49%;height:6.56%;"><img class="overlay-png" src="5I.png" alt=""></div>
        <div class="zona" id="zona-izq-6" data-id="6" style="left:50.2%;top:87.62%;width:30.82%;height:12.17%;"><img class="overlay-png" src="6I.png" alt=""></div>
      </div>
      <div class="panel" id="panelDer" onclick="clickPanel(event,'der')">
        <img class="fondo" src="fondo_IZ_DER.jpg" alt="Imagen B" draggable="false">
        <div class="zona" id="zona-der-7" data-id="7" style="left:18.57%;top:28.78%;width:9.18%;height:8.25%;"><img class="overlay-png" src="1D.png" alt=""></div>
        <div class="zona" id="zona-der-8" data-id="8" style="left:1.84%;top:53.33%;width:9.18%;height:8.25%;"><img class="overlay-png" src="2D.png" alt=""></div>
        <div class="zona" id="zona-der-9" data-id="9" style="left:60.61%;top:51.64%;width:32.04%;height:6.88%;"><img class="overlay-png" src="3D.png" alt=""></div>
      </div>
    </div>
  </div>

  <!-- FOOTER con curva roja -->
  <div class="footer"><img src="logo.png" alt="Skretting"></div>

</div><!-- /col-juego -->

<!-- OVERLAYS -->
<div class="overlay" id="overlayGana">
  <div class="confetti-container" id="confettiContainer"></div>
  <div class="modal"><img src="logo.png" alt="Skretting" class="modal-logo"><div class="modal-emoji">🎉</div><div class="modal-titulo gana">¡Felicitaciones!</div><div class="modal-sub">Encontraste todas las diferencias</div><button class="btn-jugar" onclick="reiniciar()">Jugar de nuevo</button></div>
</div>
<div class="overlay" id="overlayTiempo">
  <div class="modal"><div class="modal-emoji">⏱️</div><div class="modal-titulo pierde">¡Se agotó<br>el tiempo!</div><div class="modal-sub">Inténtalo de nuevo</div><img src="logo.png" alt="Skretting" class="modal-logo"><button class="btn-jugar" onclick="reiniciar()">Jugar de nuevo</button></div>
</div>
<div class="overlay" id="overlayVidas">
  <div class="modal"><div class="modal-emoji">💔</div><div class="modal-titulo pierde">¡Agotaste<br>tus intentos!</div><div class="modal-sub">Inténtalo de nuevo</div><img src="logo.png" alt="Skretting" class="modal-logo"><button class="btn-jugar" onclick="reiniciar()">Jugar de nuevo</button></div>
</div>

<script>
  const TOTAL=9,TIEMPO_INICIAL=15,VIDAS_INICIAL=3;
  let encontradas=new Set(),vidas=VIDAS_INICIAL,tiempo=TIEMPO_INICIAL,intervalo=null,juegoActivo=true;

  function syncColInfo(){
    const c2=document.getElementById('contadorNum2');
    const t2=document.getElementById('cronNum2');
    if(c2) c2.innerHTML=encontradas.size+'<span>/9</span>';
    if(t2){ t2.textContent=tiempo; t2.className='cron-n'+(tiempo<=5?' urgente':''); }
  }

  function iniciarCronometro(){
    clearInterval(intervalo);
    intervalo=setInterval(()=>{
      if(!juegoActivo)return;
      tiempo--;
      const el=document.getElementById('cronNum');
      el.textContent=tiempo;
      el.className='cronometro-num'+(tiempo<=5?' urgente':'');
      syncColInfo();
      if(tiempo<=0){clearInterval(intervalo);juegoActivo=false;setTimeout(()=>mostrarOverlay('overlayTiempo'),300);}
    },1000);
  }

  function clickPanel(e,panel){
    if(!juegoActivo)return;
    const zona=e.target.closest('.zona');
    if(!zona){clickError(e);return;}
    const zonaId=zona.id;
    if(encontradas.has(zonaId))return;
    encontradas.add(zonaId);
    zona.classList.add('encontrada');
    document.getElementById('contadorNum').innerHTML=encontradas.size+'<span>/9</span>';
    syncColInfo();
    if(encontradas.size===TOTAL){clearInterval(intervalo);juegoActivo=false;setTimeout(()=>{lanzarConfetti();mostrarOverlay('overlayGana');},600);}
  }

  function clickError(e){
    vidas--;
    if(vidas<3){document.getElementById('vida1').classList.add('perdido');const v=document.getElementById('vida1b');if(v)v.classList.add('perdido');}
    if(vidas<2){document.getElementById('vida2').classList.add('perdido');const v=document.getElementById('vida2b');if(v)v.classList.add('perdido');}
    if(vidas<1){document.getElementById('vida3').classList.add('perdido');const v=document.getElementById('vida3b');if(v)v.classList.add('perdido');}
    const panel=e.currentTarget;
    const rect=panel.getBoundingClientRect();
    const rip=document.createElement('div');
    rip.className='error-ripple';
    rip.style.left=(e.clientX-rect.left)+'px';
    rip.style.top=(e.clientY-rect.top)+'px';
    panel.appendChild(rip);
    setTimeout(()=>rip.remove(),550);
    if(vidas<=0){clearInterval(intervalo);juegoActivo=false;setTimeout(()=>mostrarOverlay('overlayVidas'),450);}
  }

  function lanzarConfetti(){
    const c=document.getElementById('confettiContainer');c.innerHTML='';
    const col=['#c50e2a','#fff','#f0c040','#4caf50','#2196f3','#ff9800','#e91e63'];
    for(let i=0;i<90;i++){
      const p=document.createElement('div');p.className='confetti-piece';
      p.style.left=Math.random()*100+'vw';p.style.width=(8+Math.random()*14)+'px';
      p.style.height=(12+Math.random()*22)+'px';p.style.background=col[Math.floor(Math.random()*col.length)];
      p.style.animationDuration=(1.5+Math.random()*2.5)+'s';p.style.animationDelay=(Math.random()*1.2)+'s';
      p.style.transform='rotate('+Math.random()*360+'deg)';c.appendChild(p);
    }
  }

  function mostrarOverlay(id){document.getElementById(id).classList.add('visible');}

  function reiniciar(){
    encontradas.clear();vidas=VIDAS_INICIAL;tiempo=TIEMPO_INICIAL;juegoActivo=true;
    ['overlayGana','overlayTiempo','overlayVidas'].forEach(id=>document.getElementById(id).classList.remove('visible'));
    document.querySelectorAll('.zona').forEach(z=>z.classList.remove('encontrada'));
    document.getElementById('contadorNum').innerHTML='0<span>/9</span>';
    const cn=document.getElementById('cronNum');cn.textContent=15;cn.className='cronometro-num';
    ['vida1','vida2','vida3'].forEach(id=>document.getElementById(id).classList.remove('perdido'));
    ['vida1b','vida2b','vida3b'].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.remove('perdido');});
    document.getElementById('confettiContainer').innerHTML='';
    syncColInfo();
    iniciarCronometro();
  }

  iniciarCronometro();
</script>
</body>
</html>
