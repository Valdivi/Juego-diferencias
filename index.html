<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>Editor de Zonas – Skretting</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: monospace; background:#1a1a2e; color:#eee; }

  /* TOOLBAR */
  .toolbar {
    position:fixed; top:0; left:0; right:0; z-index:1000;
    background:#16213e; padding:12px 24px;
    display:flex; align-items:center; gap:16px;
    border-bottom:2px solid #c50e2a;
    flex-wrap:wrap;
  }
  .toolbar h1 { font-size:16px; color:#c50e2a; margin-right:8px; }
  .toolbar span { font-size:13px; color:#aaa; }
  .btn-dl {
    background:#c50e2a; color:#fff; border:none;
    padding:10px 24px; border-radius:6px; cursor:pointer;
    font-size:14px; font-weight:700; margin-left:auto;
  }
  .btn-dl:hover { background:#a50b23; }
  .btn-reset {
    background:#333; color:#fff; border:none;
    padding:10px 18px; border-radius:6px; cursor:pointer;
    font-size:13px;
  }
  .selected-info {
    background:#0f3460; padding:6px 14px; border-radius:6px;
    font-size:13px; color:#7ec8e3; min-width:240px;
  }

  /* CANVAS AREA */
  .canvas-wrap {
    margin-top:64px;
    display:flex;
    justify-content:center;
    gap:32px;
    padding:32px;
  }

  .panel-wrap {
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
  }
  .panel-label {
    font-size:14px; font-weight:700;
    color:#c50e2a; letter-spacing:2px;
    text-transform:uppercase;
  }

  /* Los paneles se muestran al 50% del original para que quepan en pantalla */
  /* Original: 490×945 → display: 490×945 con zoom CSS */
  .panel {
    position:relative;
    width:490px; height:945px;
    transform-origin: top left;
    transform: scale(0.6);
    margin-bottom: -378px; /* compensar el scale */
    border-radius:8px;
    overflow:visible;
    box-shadow:0 0 0 3px #333;
  }
  .panel img.fondo {
    width:100%; height:100%;
    object-fit:cover; display:block;
    border-radius:8px;
    pointer-events:none;
  }

  /* ZONA DRAGGABLE */
  .zona-editor {
    position:absolute;
    border:3px solid;
    border-radius:6px;
    cursor:grab;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    user-select:none;
    transition:box-shadow .15s;
  }
  .zona-editor:active { cursor:grabbing; }
  .zona-editor.selected {
    box-shadow: 0 0 0 3px #fff, 0 0 0 6px #ffeb3b;
  }
  .zona-editor img {
    width:100%; height:100%;
    object-fit:fill; pointer-events:none;
    opacity:0.85;
  }
  .zona-label {
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.75);
    color:#fff; font-size:11px; font-weight:700;
    padding:2px 6px; border-radius:3px;
    pointer-events:none;
    white-space:nowrap;
  }

  /* TABLA DE COORDENADAS */
  .coords-table {
    position:fixed;
    bottom:0; left:0; right:0;
    background:#16213e;
    border-top:2px solid #c50e2a;
    padding:10px 24px;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    z-index:1000;
  }
  .coord-item {
    background:#0f3460;
    border-radius:6px;
    padding:4px 10px;
    font-size:11px;
    color:#7ec8e3;
    cursor:pointer;
    transition:background .15s;
  }
  .coord-item:hover { background:#1a4a8a; }
  .coord-item.sel { background:#c50e2a; color:#fff; }
  .coord-item span { color:#fff; font-weight:700; }
</style>
</head>

<script>

const zonas = {

  'ze-izq-2': { panel:'izq', num:2, src:'2I.png',  left:85,  top:405, w:45,  h:78,  color:'#ff9800', label:'2I', gameId:'zona-izq-2', dataId:2 },
  'ze-izq-3': { panel:'izq', num:3, src:'3I.png',  left:291, top:568, w:152, h:91,  color:'#ffeb3b', label:'3I', gameId:'zona-izq-3', dataId:3 },
  'ze-izq-4': { panel:'izq', num:4, src:'4I.png',  left:0,   top:353, w:55,  h:49,  color:'#69f0ae', label:'4I', gameId:'zona-izq-4', dataId:4 },
  'ze-izq-5': { panel:'izq', num:5, src:'5I.png',  left:331, top:630, w:71,  h:62,  color:'#40c4ff', label:'5I', gameId:'zona-izq-5', dataId:5 },
  'ze-izq-6': { panel:'izq', num:6, src:'6I.png',  left:169, top:820, w:151, h:115, color:'#ea80fc', label:'6I', gameId:'zona-izq-6', dataId:6 },
  'ze-der-7': { panel:'der', num:7, src:'1D.png',  left:58,  top:310, w:45,  h:78,  color:'#ff5252', label:'1D', gameId:'zona-der-7', dataId:7 },
  'ze-der-8': { panel:'der', num:8, src:'2D.png',  left:23,  top:507, w:45,  h:78,  color:'#ff9800', label:'2D', gameId:'zona-der-8', dataId:8 },
  'ze-der-9': { panel:'der', num:9, src:'3D.png',  left:392, top:440, w:157, h:65,  color:'#ffeb3b', label:'3D', gameId:'zona-der-9', dataId:9 },
};

// Scale del panel en el editor (CSS transform: scale(0.6))
const SCALE = 0.6;
let selected = null;
let dragging = null;
let dragStartX, dragStartY, dragStartLeft, dragStartTop;

// ── Drag & Drop ──
document.querySelectorAll('.zona-editor').forEach(el => {
  el.addEventListener('mousedown', onMouseDown);
  el.addEventListener('click', onClickZona);
});

function onClickZona(e) {
  e.stopPropagation();
  selectZona(this.id);
}

function selectZona(id) {
  document.querySelectorAll('.zona-editor').forEach(z => z.classList.remove('selected'));
  selected = id;
  document.getElementById(id).classList.add('selected');
  updateInfo(id);
  updateCoordsTable();
}

function onMouseDown(e) {
  e.preventDefault();
  dragging = this;
  const z = zonas[this.id];
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  dragStartLeft = z.left;
  dragStartTop = z.top;
  selectZona(this.id);

  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup', onMouseUp);
}

function onMouseMove(e) {
  if (!dragging) return;
  const id = dragging.id;
  const z = zonas[id];
  const panel = document.getElementById('panel' + (z.panel === 'izq' ? 'Izq' : 'Der'));
  const panelRect = panel.getBoundingClientRect();

  // Delta en px de pantalla → dividir por scale para obtener px del panel
  const dx = (e.clientX - dragStartX) / SCALE;
  const dy = (e.clientY - dragStartY) / SCALE;

  let newLeft = Math.round(dragStartLeft + dx);
  let newTop  = Math.round(dragStartTop  + dy);

  // Clamp dentro del panel
  newLeft = Math.max(0, Math.min(490 - z.w, newLeft));
  newTop  = Math.max(0, Math.min(945 - z.h, newTop));

  z.left = newLeft;
  z.top  = newTop;

  dragging.style.left = newLeft + 'px';
  dragging.style.top  = newTop  + 'px';

  updateInfo(id);
  updateCoordsTable();
}

function onMouseUp() {
  dragging = null;
  document.removeEventListener('mousemove', onMouseMove);
  document.removeEventListener('mouseup', onMouseUp);
}

// ── UI ──
function updateInfo(id) {
  const z = zonas[id];
  document.getElementById('selectedInfo').innerHTML =
    `<b style="color:#ffeb3b">${z.label}</b> &nbsp;|&nbsp; left: <b>${z.left}px</b> &nbsp; top: <b>${z.top}px</b> &nbsp; w: <b>${z.w}px</b> &nbsp; h: <b>${z.h}px</b>`;
}

function updateCoordsTable() {
  const table = document.getElementById('coordsTable');
  table.innerHTML = Object.entries(zonas).map(([id, z]) =>
    `<div class="coord-item ${id === selected ? 'sel' : ''}" onclick="selectZona('${id}')">
      <b>${z.label}</b> L:<span>${z.left}</span> T:<span>${z.top}</span>
    </div>`
  ).join('');
}

function resetZonas() {
  if (!confirm('¿Resetear todas las zonas a la posición actual del index.html?')) return;
  location.reload();
}

  function iniciarCronometro(){clearInterval(intervalo);intervalo=setInterval(()=>{if(!juegoActivo)return;tiempo--;const el=document.getElementById('cronNum');el.textContent=tiempo;el.className='cronometro-num'+(tiempo<=5?' urgente':'');if(tiempo<=0){clearInterval(intervalo);juegoActivo=false;setTimeout(()=>mostrarOverlay('overlayTiempo'),300);}},1000);}

  function lanzarConfetti(){const c=document.getElementById('confettiContainer');c.innerHTML='';const col=['#c50e2a','#fff','#f0c040','#4caf50','#2196f3','#ff9800','#e91e63'];for(let i=0;i<90;i++){const p=document.createElement('div');p.className='confetti-piece';p.style.left=Math.random()*100+'vw';p.style.width=(8+Math.random()*14)+'px';p.style.height=(12+Math.random()*22)+'px';p.style.background=col[Math.floor(Math.random()*col.length)];p.style.animationDuration=(1.5+Math.random()*2.5)+'s';p.style.animationDelay=(Math.random()*1.2)+'s';p.style.transform='rotate('+Math.random()*360+'deg)';c.appendChild(p);}}
