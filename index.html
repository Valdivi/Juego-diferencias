<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Skretting – Encuentra las 9 Diferencias</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  :root { --rojo:#c50e2a; --negro:#111; --blanco:#fff; --gris:#e8e8e8; }

  body {
    font-family:'Montserrat',sans-serif;
    background:var(--gris);
    width:1080px;
    margin:0 auto;
    overflow-x:hidden;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  /* HEADER */
  .header { width:100%; padding:40px 48px 20px; text-align:center; }
  .titulo { font-size:80px; font-weight:900; text-transform:uppercase; line-height:1.1; color:var(--negro); }
  .titulo span { color:var(--rojo); }

  /* BARRA */
  .barra-wrap { width:100%; position:relative; margin-top:16px; }
  .barra {
    width:100%; background:var(--negro); height:100px;
    display:flex; align-items:center; justify-content:space-between; padding:0 60px;
  }
  .cronometro-wrap {
    position:absolute; left:50%; transform:translateX(-50%); top:-32px; z-index:10;
  }
  .cronometro {
    width:128px; height:128px; border-radius:50%;
    background:var(--blanco); border:5px solid var(--negro);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    box-shadow:0 4px 20px rgba(0,0,0,.35);
  }
  .cronometro-num { font-size:50px; font-weight:900; color:var(--negro); line-height:1; }
  .cronometro-num.urgente { color:var(--rojo); animation:latido .5s ease infinite; }
  .cronometro-label { font-size:14px; font-weight:700; color:#888; text-transform:uppercase; letter-spacing:1px; }

  .stat-label { font-size:16px; font-weight:700; text-transform:uppercase; opacity:.6; letter-spacing:2px; color:var(--blanco); }
  .stat-valor { font-size:52px; font-weight:900; color:var(--blanco); line-height:1; }
  .stat-valor span { color:var(--rojo); }

  .vidas { display:flex; flex-direction:column; align-items:flex-end; }
  .vidas-iconos { display:flex; gap:8px; margin-top:4px; }
  .corazon { font-size:44px; transition:all .3s; line-height:1; }
  .corazon.perdido { filter:grayscale(1); opacity:.25; }

  /* JUEGO */
  .juego-contenedor { width:100%; padding:24px 20px 0; display:flex; justify-content:center; }
  .juego-inner {
    display:flex; gap:8px;
    background:var(--blanco); border-radius:16px; padding:10px;
    box-shadow:0 8px 40px rgba(0,0,0,.15);
  }

  /* Panel: imagen original 520×1003 → 490×945 */
  .panel {
    position:relative; width:490px; height:945px;
    border-radius:8px; overflow:hidden;
    cursor:crosshair; flex-shrink:0; user-select:none;
  }
  .panel img.fondo {
    width:100%; height:100%; object-fit:cover; display:block;
    pointer-events:none; -webkit-user-drag:none;
  }

  /* PNG superpuesto — pointer-events:none para que el click pase al .zona */
  .zona {
    position:absolute; border:3px dashed transparent;
    border-radius:8px; cursor:pointer;
    transition:border-color .2s, background .2s;
    overflow:hidden;
  }
  .zona img.overlay-png {
    width:100%; height:100%; object-fit:fill;
    display:block; pointer-events:none;
  }
  .zona:hover { border-color:rgba(255,230,0,.7); background:rgba(255,230,0,.05); }
  .zona.encontrada {
    border:3px solid #00e676 !important;
    pointer-events:none; animation:pulso-ok .4s ease;
  }
  .zona.encontrada::after {
    content:'✓';
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    font-size:28px; color:#00e676;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,.7));
    z-index:5;
  }

  .error-ripple {
    position:absolute; width:56px; height:56px; border-radius:50%;
    background:rgba(197,14,42,.45);
    transform:translate(-50%,-50%) scale(0);
    animation:ripple .5s ease-out forwards;
    pointer-events:none; z-index:6;
  }

  /* FOOTER */
  .footer {
    width:100%; display:flex; justify-content:center;
    padding:36px 0 48px; margin-top:24px;
  }
  .footer img { height:80px; }

  /* OVERLAYS */
  .overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,.78); z-index:200;
    align-items:center; justify-content:center;
  }
  .overlay.visible { display:flex; }
  .modal {
    background:var(--blanco); border-radius:28px;
    padding:64px 80px; text-align:center; max-width:740px; width:90%;
  }
  .modal-logo { height:72px; margin-bottom:32px; }
  .modal-emoji { font-size:96px; line-height:1; margin-bottom:16px; }
  .modal-titulo { font-size:68px; font-weight:900; text-transform:uppercase; line-height:1.05; margin-bottom:16px; }
  .modal-titulo.gana { color:var(--rojo); }
  .modal-titulo.pierde { color:var(--negro); }
  .modal-sub { font-size:30px; color:#666; font-weight:600; margin-bottom:44px; }
  .btn-jugar {
    background:var(--rojo); color:var(--blanco); border:none;
    border-radius:60px; padding:22px 72px; font-size:30px; font-weight:900;
    cursor:pointer; font-family:'Montserrat',sans-serif;
    text-transform:uppercase; letter-spacing:2px;
    transition:transform .15s, background .15s;
  }
  .btn-jugar:hover { transform:scale(1.04); background:#a50b23; }

  .confetti-container { position:fixed; inset:0; pointer-events:none; z-index:199; overflow:hidden; }
  .confetti-piece { position:absolute; top:-20px; border-radius:3px; animation:caer linear forwards; }

  @keyframes pulso-ok { 0%{transform:scale(1)} 50%{transform:scale(1.07)} 100%{transform:scale(1)} }
  @keyframes ripple { to{transform:translate(-50%,-50%) scale(3.5);opacity:0} }
  @keyframes caer { to{top:110vh;transform:rotate(720deg)} }
  @keyframes latido { 0%,100%{transform:scale(1)} 50%{transform:scale(1.18)} }
</style>
</head>
<body>

<div class="header">
  <div class="titulo">Encuentra las<br><span>9 Diferencias</span></div>
</div>

<div class="barra-wrap">
  <div class="barra">
    <div class="contador">
      <div class="stat-label">Encontradas</div>
      <div class="stat-valor" id="contadorNum">0<span>/9</span></div>
    </div>
    <div class="cronometro-wrap">
      <div class="cronometro">
        <div class="cronometro-num" id="cronNum">15</div>
        <div class="cronometro-label">seg</div>
      </div>
    </div>
    <div class="vidas">
      <div class="stat-label">Vidas</div>
      <div class="vidas-iconos">
        <span class="corazon" id="vida1">❤️</span>
        <span class="corazon" id="vida2">❤️</span>
        <span class="corazon" id="vida3">❤️</span>
      </div>
    </div>
  </div>
</div>

<div class="juego-contenedor">
  <div class="juego-inner">

    <!-- ══ PANEL IZQUIERDO: 6 zonas ══ -->
    <!-- Escala: X * (490/520) = X * 0.9423  |  Y * (945/1003) = Y * 0.9422 -->
    <div class="panel" id="panelIzq" onclick="clickPanel(event,'izq')">
      <img class="fondo" src="fondo_IZ_DER.jpg" alt="Imagen A" draggable="false">

      <!-- 1I: centro horizontal, 1/4 desde borde superior -->
      <!-- W=57 H=22 originales | centro panel 245px, 1/4 alto=236px -->
      <div class="zona" id="zona-izq-1" data-id="1"
        style="left:216px; top:225px; width:57px; height:22px;">
        <img class="overlay-png" src="1I.png" alt="">
      </div>

      <!-- 2I: centro vertical, 1/4 desde margen izquierdo -->
      <!-- W=45 H=78 originales | 1/4 ancho=122px, centro alto=472px -->
      <div class="zona" id="zona-izq-2" data-id="2"
        style="left:99px; top:433px; width:45px; height:78px;">
        <img class="overlay-png" src="2I.png" alt="">
      </div>

      <!-- 3I: centro horizontal, 1/4 desde margen derecho -->
      <!-- W=152 H=91 originales | 3/4 ancho=367px, 1/4 alto=236px -->
      <div class="zona" id="zona-izq-3" data-id="3"
        style="left:291px; top:190px; width:152px; height:91px;">
        <img class="overlay-png" src="3I.png" alt="">
      </div>

      <!-- 4I: 20% más abajo del centro, 2/4 desde izquierdo -->
      <!-- W=55 H=49 originales | centro=245px, Y=661px -->
      <div class="zona" id="zona-izq-4" data-id="4"
        style="left:217px; top:636px; width:55px; height:49px;">
        <img class="overlay-png" src="4I.png" alt="">
      </div>

      <!-- 5I: 20% más abajo del centro, 2/4 desde derecho -->
      <!-- W=71 H=62 originales | 3/4 ancho=367px, Y=661px -->
      <div class="zona" id="zona-izq-5" data-id="5"
        style="left:331px; top:630px; width:71px; height:62px;">
        <img class="overlay-png" src="5I.png" alt="">
      </div>

      <!-- 6I: centro horizontal, pegado al margen inferior -->
      <!-- W=151 H=115 originales | centro=245px, bottom=945px -->
      <div class="zona" id="zona-izq-6" data-id="6"
        style="left:169px; top:820px; width:151px; height:115px;">
        <img class="overlay-png" src="6I.png" alt="">
      </div>
    </div>

    <!-- ══ PANEL DERECHO: 3 zonas ══ -->
    <div class="panel" id="panelDer" onclick="clickPanel(event,'der')">
      <img class="fondo" src="fondo_IZ_DER.jpg" alt="Imagen B" draggable="false">

      <!-- 7 (1D): W=45 H=78 originales | 0.5/3 desde izq=81px, 30% desde arriba=283px -->
      <div class="zona" id="zona-der-7" data-id="7"
        style="left:58px; top:244px; width:45px; height:78px;">
        <img class="overlay-png" src="1D.png" alt="">
      </div>

      <!-- 8 (2D): W=45 H=78 originales | 3% desde izq=14px, 40% desde abajo=567px -->
      <div class="zona" id="zona-der-8" data-id="8"
        style="left:14px; top:489px; width:45px; height:78px;">
        <img class="overlay-png" src="2D.png" alt="">
      </div>

      <!-- 9 (3D): W=157 H=65 originales | 10% desde izq=49px, 60% desde arriba=567px -->
      <div class="zona" id="zona-der-9" data-id="9"
        style="left:49px; top:534px; width:157px; height:65px;">
        <img class="overlay-png" src="3D.png" alt="">
      </div>
    </div>

  </div>
</div>

<div class="footer">
  <img src="logo.png" alt="Skretting">
</div>

<!-- OVERLAY GANASTE -->
<div class="overlay" id="overlayGana">
  <div class="confetti-container" id="confettiContainer"></div>
  <div class="modal">
    <img src="logo.png" alt="Skretting" class="modal-logo">
    <div class="modal-emoji">🎉</div>
    <div class="modal-titulo gana">¡Felicitaciones!</div>
    <div class="modal-sub">Encontraste todas las diferencias</div>
    <button class="btn-jugar" onclick="reiniciar()">Jugar de nuevo</button>
  </div>
</div>

<!-- OVERLAY TIEMPO -->
<div class="overlay" id="overlayTiempo">
  <div class="modal">
    <div class="modal-emoji">⏱️</div>
    <div class="modal-titulo pierde">¡Se agotó<br>el tiempo!</div>
    <div class="modal-sub">Inténtalo de nuevo</div>
    <img src="logo.png" alt="Skretting" class="modal-logo">
    <button class="btn-jugar" onclick="reiniciar()">Jugar de nuevo</button>
  </div>
</div>

<!-- OVERLAY VIDAS -->
<div class="overlay" id="overlayVidas">
  <div class="modal">
    <div class="modal-emoji">💔</div>
    <div class="modal-titulo pierde">¡Agotaste<br>tus intentos!</div>
    <div class="modal-sub">Inténtalo de nuevo</div>
    <img src="logo.png" alt="Skretting" class="modal-logo">
    <button class="btn-jugar" onclick="reiniciar()">Jugar de nuevo</button>
  </div>
</div>

<script>
  const TOTAL=9, TIEMPO_INICIAL=15, VIDAS_INICIAL=3;
  let encontradas=new Set(), vidas=VIDAS_INICIAL, tiempo=TIEMPO_INICIAL;
  let intervalo=null, juegoActivo=true;

  function iniciarCronometro(){
    clearInterval(intervalo);
    intervalo=setInterval(()=>{
      if(!juegoActivo) return;
      tiempo--;
      const el=document.getElementById('cronNum');
      el.textContent=tiempo;
      el.className='cronometro-num'+(tiempo<=5?' urgente':'');
      if(tiempo<=0){
        clearInterval(intervalo); juegoActivo=false;
        setTimeout(()=>mostrarOverlay('overlayTiempo'),300);
      }
    },1000);
  }

  function clickPanel(e,panel){
    if(!juegoActivo) return;
    const zona=e.target.closest('.zona');
    if(!zona || zona.style.opacity==='0'){ clickError(e); return; }
    const zonaId=zona.id;
    if(encontradas.has(zonaId)) return;
    encontradas.add(zonaId);
    zona.classList.add('encontrada');
    document.getElementById('contadorNum').innerHTML=`${encontradas.size}<span>/${TOTAL}</span>`;
    if(encontradas.size===TOTAL){
      clearInterval(intervalo); juegoActivo=false;
      setTimeout(()=>{ lanzarConfetti(); mostrarOverlay('overlayGana'); },600);
    }
  }

  function clickError(e){
    vidas--;
    if(vidas<3) document.getElementById('vida1').classList.add('perdido');
    if(vidas<2) document.getElementById('vida2').classList.add('perdido');
    if(vidas<1) document.getElementById('vida3').classList.add('perdido');
    const panel=e.currentTarget;
    const rect=panel.getBoundingClientRect();
    const rip=document.createElement('div');
    rip.className='error-ripple';
    rip.style.left=(e.clientX-rect.left)+'px';
    rip.style.top=(e.clientY-rect.top)+'px';
    panel.appendChild(rip);
    setTimeout(()=>rip.remove(),550);
    if(vidas<=0){
      clearInterval(intervalo); juegoActivo=false;
      setTimeout(()=>mostrarOverlay('overlayVidas'),450);
    }
  }

  function lanzarConfetti(){
    const c=document.getElementById('confettiContainer'); c.innerHTML='';
    const col=['#c50e2a','#fff','#f0c040','#4caf50','#2196f3','#ff9800','#e91e63'];
    for(let i=0;i<90;i++){
      const p=document.createElement('div'); p.className='confetti-piece';
      p.style.left=Math.random()*100+'vw';
      p.style.width=(8+Math.random()*14)+'px';
      p.style.height=(12+Math.random()*22)+'px';
      p.style.background=col[Math.floor(Math.random()*col.length)];
      p.style.animationDuration=(1.5+Math.random()*2.5)+'s';
      p.style.animationDelay=(Math.random()*1.2)+'s';
      p.style.transform=`rotate(${Math.random()*360}deg)`;
      c.appendChild(p);
    }
  }

  function mostrarOverlay(id){ document.getElementById(id).classList.add('visible'); }

  function reiniciar(){
    encontradas.clear(); vidas=VIDAS_INICIAL; tiempo=TIEMPO_INICIAL; juegoActivo=true;
    ['overlayGana','overlayTiempo','overlayVidas'].forEach(id=>
      document.getElementById(id).classList.remove('visible'));
    document.querySelectorAll('.zona').forEach(z=>{
      z.classList.remove('encontrada');
    });
    document.getElementById('contadorNum').innerHTML=`0<span>/${TOTAL}</span>`;
    const cn=document.getElementById('cronNum');
    cn.textContent=15; cn.className='cronometro-num';
    document.getElementById('vida1').classList.remove('perdido');
    document.getElementById('vida2').classList.remove('perdido');
    document.getElementById('vida3').classList.remove('perdido');
    document.getElementById('confettiContainer').innerHTML='';
    iniciarCronometro();
  }

  iniciarCronometro();
</script>
</body>
</html>
